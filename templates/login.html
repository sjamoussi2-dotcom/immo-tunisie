{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width:420px;">
  <div class="card shadow-sm p-4">
    <h3 class="fw-bold mb-3 text-center">{{ t('login_title') }}</h3>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">{{ t('form_email') }}</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">{{ t('form_password') }}</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-semibold">{{ t('nav_login') }}</button>
    </form>
    <p class="text-center mt-3 mb-0 small">{{ t('no_account_yet') }} <a href="{{ url_for('register') }}">{{ t('nav_register') }}</a></p>
  </div>
</div>
{% endblock %}
